{% extends "base.html" %}
{% block title %}Agregar variante - {{ app_name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-2">Agregar variante</h1>
<p class="text-gray-600 mb-8">Producto: {{ product.name }}</p>

<form method="post" class="bg-white shadow rounded-lg p-6 max-w-lg space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label class="block text-sm font-medium text-gray-700">SKU</label>
        <input type="text" name="sku" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Precio ($)</label>
            <input type="number" name="price" step="0.01" min="0" value="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Costo ($)</label>
            <input type="number" name="cost" step="0.01" min="0" value="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
        </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Talle</label>
            <input type="text" name="size" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Color</label>
            <input type="text" name="color" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
        </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Stock inicial</label>
            <input type="number" name="initial_stock" min="0" value="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Punto de reposición</label>
            <input type="number" name="reorder_point" min="0" value="5" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border px-3 py-2">
        </div>
    </div>
    <div class="flex space-x-4">
        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Agregar variante</button>
        <a href="{{ url_for('web_products.detail', product_id=product.id) }}" class="px-4 py-2 border border-gray-300 rounded-md">Cancelar</a>
    </div>
</form>
{% endblock %}
