{% extends "base.html" %}
{% block title %}Editar {{ product.name }} - {{ app_name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-8">Editar producto</h1>

<form method="post" class="bg-white shadow rounded-lg p-6 max-w-lg space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label class="block text-sm font-medium text-gray-700">Nombre *</label>
        <input type="text" name="name" required value="{{ product.name }}"
               class="mt-1 block w-full rounded-md border px-3 py-2">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">Categoría</label>
        <select name="category_id" class="mt-1 block w-full rounded-md border px-3 py-2">
            <option value="">—</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Unidad</label>
            <input type="text" name="unit" value="{{ product.unit or '' }}"
                   class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Proveedor</label>
            <input type="text" name="supplier" value="{{ product.supplier or '' }}"
                   class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">Observaciones</label>
        <textarea name="description" rows="3" class="mt-1 block w-full rounded-md border px-3 py-2">{{ product.description or '' }}</textarea>
    </div>
    <div class="flex space-x-4">
        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Guardar</button>
        <a href="{{ url_for('web_products.detail', product_id=product.id) }}" class="px-4 py-2 border border-gray-300 rounded-md">Cancelar</a>
    </div>
</form>
{% endblock %}
