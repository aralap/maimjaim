{% extends "base.html" %}
{% block title %}Nuevo producto - {{ app_name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-8">Nuevo producto</h1>

<form method="post" class="bg-white shadow rounded-lg p-6 max-w-lg space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label class="block text-sm font-medium text-gray-700">Nombre *</label>
        <input type="text" name="name" required class="mt-1 block w-full rounded-md border px-3 py-2">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">SKU *</label>
        <input type="text" name="sku" required class="mt-1 block w-full rounded-md border px-3 py-2">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">Categoría</label>
        <select name="category_id" class="mt-1 block w-full rounded-md border px-3 py-2">
            <option value="">—</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Unidad</label>
            <input type="text" name="unit" placeholder="unidad, atado, servicio" class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Proveedor</label>
            <input type="text" name="supplier" class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">Observaciones</label>
        <textarea name="description" rows="3" class="mt-1 block w-full rounded-md border px-3 py-2"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Precio venta ($)</label>
            <input type="number" name="price" step="0.01" min="0" value="0" class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Costo unitario ($)</label>
            <input type="number" name="cost" step="0.01" min="0" value="0" class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Stock inicial</label>
            <input type="number" name="initial_stock" min="0" value="0" class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Stock mínimo</label>
            <input type="number" name="reorder_point" min="0" value="5" class="mt-1 block w-full rounded-md border px-3 py-2">
        </div>
    </div>
    <div class="flex space-x-4">
        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Crear</button>
        <a href="{{ url_for('web_products.list_products') }}" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancelar</a>
    </div>
</form>
{% endblock %}
