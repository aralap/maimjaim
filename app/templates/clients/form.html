{% extends "base.html" %}
{% block title %}{{ title }} - {{ app_name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-8">{{ title }}</h1>

<form method="post" action="{{ form_action }}" class="bg-white shadow rounded-lg p-6 max-w-2xl space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if request.args.get('next') %}
    <input type="hidden" name="next" value="{{ request.args.get('next') }}">
    {% endif %}

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Nombre *</label>
            <input type="text" name="name" required value="{{ client.name if client else '' }}"
                   class="mt-1 block w-full border rounded-md px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Teléfono</label>
            <input type="text" name="phone" value="{{ client.phone if client else '' }}"
                   class="mt-1 block w-full border rounded-md px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" value="{{ client.email if client else '' }}"
                   class="mt-1 block w-full border rounded-md px-3 py-2">
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Dirección</label>
            <input type="text" name="address" value="{{ client.address if client else '' }}"
                   class="mt-1 block w-full border rounded-md px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Ciudad</label>
            <input type="text" name="city" value="{{ client.city if client else '' }}"
                   class="mt-1 block w-full border rounded-md px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">CUIT/DNI</label>
            <input type="text" name="tax_id" value="{{ client.tax_id if client else '' }}"
                   class="mt-1 block w-full border rounded-md px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Medio de pago preferido</label>
            <select name="preferred_payment_method" class="mt-1 block w-full border rounded-md px-3 py-2">
                <option value="">—</option>
                {% for value, label in payment_methods %}
                <option value="{{ value }}" {% if client and client.preferred_payment_method == value %}selected{% endif %}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>
        </div>
        {% if client %}
        <div class="flex items-center pt-6">
            <input type="checkbox" name="is_active" id="is_active" class="rounded border-gray-300"
                   {% if client.is_active %}checked{% endif %}>
            <label for="is_active" class="ml-2 text-sm text-gray-700">Activo</label>
        </div>
        {% endif %}
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Notas</label>
            <textarea name="notes" rows="3" class="mt-1 block w-full border rounded-md px-3 py-2">{{ client.notes if client else '' }}</textarea>
        </div>
    </div>

    <div class="flex space-x-4 pt-2">
        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Guardar</button>
        <a href="{{ url_for('web_clients.list_clients') }}" class="px-4 py-2 border border-gray-300 rounded-md">Cancelar</a>
    </div>
</form>
{% endblock %}
